triage_case:
  description: >
    Produce a compact work plan from the case input. Identify owner, geography, key systems,
    service type, review domains, and missing intake only.
  expected_output: >
    Compact JSON with case_summary, review_domains, assumptions, and missing_intake_fields.
  agent: compliance_orchestrator

map_obligations:
  description: >
    Map only likely material obligations: privacy, AI/model, continuity, technical, finance,
    third-party, licensing, ESG/HSE, and regulatory controls.
  expected_output: >
    Compact JSON with obligations, applicability_status, evidence_required, and domain_owner.
  agent: regulatory_obligation_mapper

examine_evidence:
  description: >
    Examine evidence summaries. Separate supported claims, unsupported claims, stale evidence,
    missing artifacts, and required confirmations.
  expected_output: >
    Compact JSON with supported_claims, evidence_ids, missing_evidence, and confidence_notes.
  agent: evidence_examiner

recommend_controls:
  description: >
    Convert material obligations and evidence gaps into controls, blockers, remediation steps,
    and escalation owners.
  expected_output: >
    Compact JSON with controls, blocking_gaps, non_blocking_gaps, owners, and remediation_plan.
  agent: risk_control_analyst

review_responsible_ai:
  description: >
    Review for unsupported approval, invented obligations, bias-sensitive assumptions,
    missing human approval, and poor fallback labeling.
  expected_output: >
    Compact JSON with responsible_ai_checks, required_corrections, and final_output_safe_for_human_review.
  agent: responsible_ai_reviewer

package_audit_brief:
  description: >
    Package an audit-ready brief with trace, evidence IDs, recommendation, readiness score,
    controls, gaps, escalation path, and residual risks.
  expected_output: >
    Compact JSON decision brief suitable for human approval and audit review.
  agent: audit_packager
